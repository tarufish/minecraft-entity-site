<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
マイクラ エンティティID一覧【Java版・統合版】
</title>

<link rel="stylesheet" href="https://fonts.cdnfonts.com/css/minecraft-4">

<style>

body{
margin:0;
background:#0f1115;
color:white;
font-family:Arial,sans-serif;
overflow-x:hidden;
transition:0.3s;
}

header{
background:#181c24;
padding:25px;
text-align:center;
font-size:30px;
font-weight:bold;
position:sticky;
top:0;
z-index:999;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.guide{
background:#1b2230;
padding:20px;
border-radius:18px;
margin-bottom:20px;
}

.guide code{
background:#0f1115;
padding:5px 10px;
border-radius:8px;
color:#3b82f6;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#1f2633;
color:white;
font-size:18px;
margin-bottom:20px;
box-sizing:border-box;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:25px;
}

.tab{
padding:12px 20px;
border:none;
border-radius:10px;
background:#222a38;
color:white;
cursor:pointer;
}

.active{
background:#3b82f6;
}

.section-title{
font-size:32px;
margin-top:40px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));
gap:18px;
}

.card{
background:#1a1f29;
padding:18px;
border-radius:18px;
transition:0.25s;
}

.card:hover{
transform:translateY(-5px);
}

.mob{
font-size:24px;
margin-bottom:10px;
font-weight:bold;
}

.jp{
color:#aaa;
margin-bottom:10px;
}

.edition{
color:#60a5fa;
margin-bottom:10px;
}

.id{
color:#3b82f6;
margin-bottom:15px;
}

.copyBtn{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
cursor:pointer;
}

/* AI */

#openAiBtn{
position:fixed;
left:20px;
bottom:90px;
width:60px;
height:60px;
border:none;
border-radius:50%;
background:#8b5cf6;
color:white;
font-size:24px;
cursor:pointer;
z-index:9999;
}

.aiBox{
position:fixed;
right:-420px;
top:0;
width:400px;
height:100vh;
background:#111827;
padding:20px;
transition:0.35s;
z-index:9998;
overflow:auto;
}

.aiBox.open{
right:0;
}

#chat{
height:60vh;
overflow:auto;
background:#1f2937;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

.message{
padding:12px;
border-radius:12px;
margin-bottom:12px;
}

.user{
background:#2563eb;
}

.ai{
background:#374151;
}

.aiBox button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#3b82f6;
color:white;
margin-top:10px;
}

/* top */

#topBtn{
position:fixed;
right:20px;
bottom:20px;
width:58px;
height:58px;
border:none;
border-radius:50%;
background:#2563eb;
color:white;
font-size:24px;
cursor:pointer;
}

/* theme */

#themeToggle{
position:fixed;
left:20px;
bottom:20px;
width:58px;
height:58px;
border:none;
border-radius:50%;
background:#6366f1;
color:white;
font-size:24px;
cursor:pointer;
}

/* light mode */

body.light{
background:#f3f4f6;
color:#111;
}

body.light header,
body.light .guide,
body.light .card,
body.light .aiBox{
background:white;
color:#111;
}

body.light input{
background:white;
color:#111;
border:1px solid #ccc;
}

body.light .guide code,
body.light code{
background:#e5e7eb;
color:#2563eb;
}

body.light .jp{
color:#555;
}

body.light #chat{
background:#f3f4f6;
}

body.light .ai{
background:#e5e7eb;
color:#111;
}

body.light .tab{
background:white;
color:#111;
border:1px solid #ccc;
}

body.light .active{
background:#3b82f6;
color:white;
}

</style>
</head>

<p>

<input

id="search"

<div class="tabs">

onclick="changeEdition('all', this)"

</button>

<button
class="tab"

<button

<input
type="text"
id="aiInput"
placeholder="質問してね！"
>

<button onclick="sendMessage()">
送信
</button>

</div>

<button id="openAiBtn" onclick="toggleAi()">
🤖
</button>

<button id="themeToggle" onclick="toggleTheme()">
🌙
</button>

<button id="topBtn" onclick="scrollToTop()">

let currentEdition = "all";

function createCard(e){

return `
<div class="card">

<div class="mob">
${e.name}
</div>

<div class="jp">
${e.jp}
</div>

<div class="edition">
${e.edition}
</div>

<div class="id">
${e.id}
</div>

<button
class="copyBtn"
onclick="copyCommand('${e.id}', this)"
>

📋 IDコピー

</button>

</div>
`;

}

function render(){

const hostile =
document.getElementById("hostile");

const friendly =
document.getElementById("friendly");

hostile.innerHTML = "";
friendly.innerHTML = "";

const search =
document.getElementById("search")
.value
.toLowerCase();

data.forEach(e=>{

const matchEdition =
currentEdition === "all" ||
e.edition === currentEdition;

const matchSearch =
e.name.toLowerCase().includes(search) ||
e.jp.includes(search) ||
e.id.includes(search);

if(matchEdition && matchSearch){

if(e.type === "hostile"){
hostile.innerHTML += createCard(e);
}
else{
friendly.innerHTML += createCard(e);
}

}

});

}

render();

function changeEdition(
edition,
btn
){

currentEdition = edition;

document
.querySelectorAll(".tab")
.forEach(t=>{
t.classList.remove("active");
});

btn.classList.add("active");

render();

}

document
.getElementById("search")
.addEventListener("input", render);

function copyCommand(id, btn){

navigator.clipboard.writeText(id);

btn.innerHTML = "✅";

setTimeout(()=>{

btn.innerHTML =
"📋 IDコピー";

},1200);

}

function toggleTheme(){

document.body.classList.toggle("light");

const btn =
document.getElementById("themeToggle");

if(
document.body.classList.contains("light")
){
btn.innerHTML = "☀️";
}
else{
btn.innerHTML = "🌙";
}

}

function scrollToTop(){

window.scrollTo({
top:0,
behavior:"smooth"
});

}

const topBtn =
document.getElementById("topBtn");

window.addEventListener("scroll",()=>{

if(window.scrollY > 300){
topBtn.classList.add("show");
}
else{
topBtn.classList.remove("show");
}

});

function toggleAi(){

document
.getElementById("aiBox")
.classList
.toggle("open");

}

function sendMessage(){

const input =
document.getElementById("aiInput");

const chat =
document.getElementById("chat");

const text = input.value;

if(text.trim() === "") return;

chat.innerHTML += `
<div class="message user">
😎 ${text}
</div>
`;

let reply =
"ごめんね🥲 まだ分からないかも！";

if(text.includes("ウォーデン")){

reply =
"わかったよ😎<br><br>" +
"<code>/summon warden</code>" +
"<br><br>で召喚できるよ！";

}

if(text.includes("100")){

reply +=
"<br><br>100体ならコマンドブロックがおすすめ🔥";

}

if(text.includes("クリーパー")){

reply =
"<code>/summon creeper</code>";

}

setTimeout(()=>{

chat.innerHTML += `
<div class="message ai">
🤖 ${reply}
</div>
`;

chat.scrollTop =
chat.scrollHeight;

},700);

input.value = "";

}

document
.getElementById("aiInput")
.addEventListener("keypress", function(e){

if(e.key === "Enter"){
sendMessage();
}

});
