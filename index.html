<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
マイクラ エンティティID一覧【Java版・統合版】
</title>

<link rel="stylesheet" href="https://fonts.cdnfonts.com/css/minecraft-4">

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
background:#0f1115;
color:white;
font-family:'Minecraft', sans-serif;
overflow-x:hidden;
}

/* 背景 */

body::before{

content:"";

position:fixed;

inset:0;

background:
radial-gradient(circle at top left,
rgba(59,130,246,0.15),
transparent 30%),

radial-gradient(circle at bottom right,
rgba(99,102,241,0.15),
transparent 30%);

animation:bgMove 10s infinite alternate ease-in-out;

z-index:-1;

}

@keyframes bgMove{

from{
transform:scale(1);
}

to{
transform:scale(1.1) translateY(-20px);
}

}

/* header */

header{

background:#181c24;

padding:25px;

text-align:center;

font-size:30px;

position:sticky;

top:0;

z-index:999;

backdrop-filter:blur(10px);

animation:glow 3s infinite alternate;

}

@keyframes glow{

from{
box-shadow:0 0 10px rgba(59,130,246,0.25);
}

to{
box-shadow:0 0 25px rgba(59,130,246,0.7);
}

}

.container{

max-width:1200px;

margin:auto;

padding:20px;

}

/* guide */

.guide{

background:#1b2230;

padding:20px;

border-radius:18px;

margin-bottom:20px;

}

.guide code{

background:#0f1115;

padding:5px 10px;

border-radius:8px;

color:#8ab4ff;

}

/* search */

input{

width:100%;

padding:15px;

border:none;

border-radius:14px;

background:#1f2633;

color:white;

font-size:18px;

box-sizing:border-box;

margin-bottom:20px;

font-family:'Minecraft', sans-serif;

}

.tabs{

display:flex;

gap:10px;

margin-bottom:25px;

flex-wrap:wrap;

}

.tab{

padding:12px 20px;

border:none;

border-radius:12px;

background:#222a38;

color:white;

cursor:pointer;

font-family:'Minecraft', sans-serif;

transition:0.2s;

}

.tab:hover{

transform:translateY(-3px);

}

.active{

background:#3b82f6;

box-shadow:
0 0 15px rgba(59,130,246,0.5);

}

.section-title{

font-size:30px;

margin-top:40px;

margin-bottom:20px;

}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:18px;

}

/* card */

.card{

background:#1a1f29;

padding:18px;

border-radius:18px;

position:relative;

overflow:hidden;

transition:0.25s;

animation:fadeUp 0.4s ease;

}

.card::before{

content:"";

position:absolute;

top:-120%;

left:-120%;

width:250%;

height:250%;

background:
linear-gradient(
45deg,
transparent,
rgba(255,255,255,0.05),
transparent);

transform:rotate(25deg);

transition:0.8s;

}

.card:hover::before{

top:100%;
left:100%;

}

.card:hover{

transform:
translateY(-6px)
scale(1.02);

box-shadow:
0 10px 25px rgba(0,0,0,0.35);

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.mob{

font-size:24px;

margin-bottom:10px;

}

.jp{

color:#aaa;

margin-bottom:10px;

}

.edition{

color:#6ea8ff;

margin-bottom:10px;

}

.id{

color:#8ab4ff;

margin-bottom:15px;

text-shadow:
0 0 8px rgba(59,130,246,0.6);

}

.copyBtn{

width:100%;

padding:12px;

border:none;

border-radius:10px;

background:#3b82f6;

color:white;

cursor:pointer;

font-family:'Minecraft', sans-serif;

transition:0.2s;

}

.copyBtn:hover{

transform:scale(1.03);

}

/* AI */

#openAiBtn{

position:fixed;

left:20px;

bottom:90px;

width:58px;

height:58px;

border:none;

border-radius:50%;

background:
linear-gradient(
135deg,
#8b5cf6,
#3b82f6);

color:white;

font-size:24px;

cursor:pointer;

z-index:9999;

}

.aiBox{

position:fixed;

right:-420px;

top:0;

width:400px;

height:100vh;

background:
rgba(15,17,21,0.95);

backdrop-filter:blur(10px);

padding:20px;

transition:0.35s;

z-index:9998;

overflow:auto;

}

.aiBox.open{

right:0;

}

#chat{

height:60vh;

overflow:auto;

background:#111827;

padding:15px;

border-radius:12px;

margin-bottom:15px;

}

.message{

padding:12px;

border-radius:12px;

margin-bottom:12px;

line-height:1.6;

}

.user{

background:#2563eb;

}

.ai{

background:#222a38;

}

.aiBox button{

width:100%;

padding:14px;

border:none;

border-radius:12px;

background:#3b82f6;

color:white;

font-family:'Minecraft', sans-serif;

margin-top:10px;

}

/* top button */

#topBtn{

position:fixed;

right:20px;

bottom:20px;

width:58px;

height:58px;

border:none;

border-radius:50%;

background:
linear-gradient(
135deg,
#3b82f6,
#2563eb);

color:white;

font-size:24px;

cursor:pointer;

opacity:0;

pointer-events:none;

transition:0.25s;

}

#topBtn.show{

opacity:1;

pointer-events:auto;

}

#themeToggle{

position:fixed;

left:20px;

bottom:20px;

width:58px;

height:58px;

border:none;

border-radius:50%;

background:
linear-gradient(
135deg,
#6366f1,
#3b82f6);

color:white;

font-size:24px;

cursor:pointer;

}

/* light mode */

body.light{

background:#f3f5fa;

color:#111;

}

body.light .card,
body.light .guide,
body.light .aiBox{

background:white;

color:#111;

}

body.light input{

background:white;

color:#111;

border:1px solid #ddd;

}

body.light #chat{

background:#f3f4f6;

}

@media(max-width:600px){

.aiBox{
width:100%;
right:-100%;
}

}

</style>
</head>

<body>

<header>
🎮 マイクラ エンティティID辞典
</header>

<div class="container">

<div class="guide">

<h2>📖 召喚方法</h2>

<p>
<code>/summon zombie</code>
</p>

<p>
<code>/summon warden</code>
</p>

</div>

<input
type="text"
id="search"
placeholder="モブ検索..."
>

<div class="tabs">

<button
class="tab active"
onclick="changeEdition('all', this)"
>
全部
</button>

<button
class="tab"
onclick="changeEdition('Java', this)"
>
Java
</button>

<button
class="tab"
onclick="changeEdition('統合版', this)"
>
統合版
</button>

</div>

<h2 class="section-title">
😈 敵対モブ
</h2>

<div class="grid" id="hostile"></div>

<h2 class="section-title">
🐮 友好モブ
</h2>

<div class="grid" id="friendly"></div>

</div>

<!-- AI -->

<div class="aiBox" id="aiBox">

<h2>🤖 チャッピーAI</h2>

<div id="chat"></div>

<input
type="text"
id="aiInput"
placeholder="質問してね！"
>

<button onclick="sendMessage()">
送信
</button>

</div>

<button id="openAiBtn" onclick="toggleAi()">
🤖
</button>

<button id="themeToggle" onclick="toggleTheme()">
🌙
</button>

<button id="topBtn" onclick="scrollToTop()">
⬆
</button>

<script>

const data = [

{
type:"hostile",
edition:"Java",
name:"Zombie",
jp:"ゾンビ",
id:"zombie"
},

{
type:"hostile",
edition:"Java",
name:"Creeper",
jp:"クリーパー",
id:"creeper"
},

{
type:"hostile",
edition:"統合版",
name:"Warden",
jp:"ウォーデン",
id:"warden"
},

{
type:"friendly",
edition:"Java",
name:"Cow",
jp:"ウシ",
id:"cow"
},

{
type:"friendly",
edition:"統合版",
name:"Allay",
jp:"アレイ",
id:"allay"
}

];

let currentEdition = "all";

function createCard(e){

return `
<div class="card">

<div class="mob">
${e.name}
</div>

<div class="jp">
${e.jp}
</div>

<div class="edition">
${e.edition}
</div>

<div class="id">
${e.id}
</div>

<button
class="copyBtn"
onclick="copyCommand('${e.id}', this)"
>

📋 IDコピー

</button>

</div>
`;

}

function render(){

const hostile =
document.getElementById("hostile");

const friendly =
document.getElementById("friendly");

hostile.innerHTML = "";
friendly.innerHTML = "";

const search =
document.getElementById("search")
.value
.toLowerCase();

data.forEach(e=>{

const matchEdition =
currentEdition === "all" ||
e.edition === currentEdition;

const matchSearch =
e.name.toLowerCase().includes(search) ||
e.jp.includes(search) ||
e.id.includes(search);

if(matchEdition && matchSearch){

if(e.type === "hostile"){
hostile.innerHTML += createCard(e);
}
else{
friendly.innerHTML += createCard(e);
}

}

});

}

render();

function changeEdition(
edition,
btn
){

currentEdition = edition;

document
.querySelectorAll(".tab")
.forEach(t=>{
t.classList.remove("active");
});

btn.classList.add("active");

render();

}

document
.getElementById("search")
.addEventListener("input", render);

function copyCommand(id, btn){

navigator.clipboard.writeText(id);

btn.innerHTML = "✅";

setTimeout(()=>{

btn.innerHTML =
"📋 IDコピー";

},1200);

}

function toggleTheme(){

document.body.classList.toggle("light");

const btn =
document.getElementById("themeToggle");

if(
document.body.classList.contains("light")
){
btn.innerHTML = "☀️";
}
else{
btn.innerHTML = "🌙";
}

}

function scrollToTop(){

window.scrollTo({
top:0,
behavior:"smooth"
});

}

const topBtn =
document.getElementById("topBtn");

window.addEventListener("scroll",()=>{

if(window.scrollY > 300){
topBtn.classList.add("show");
}
else{
topBtn.classList.remove("show");
}

});

function toggleAi(){

document
.getElementById("aiBox")
.classList
.toggle("open");

}

function sendMessage(){

const input =
document.getElementById("aiInput");

const chat =
document.getElementById("chat");

const text = input.value;

if(text.trim() === "") return;

chat.innerHTML += `
<div class="message user">
😎 ${text}
</div>
`;

let reply =
"ごめんね🥲 まだ分からないかも！";

if(text.includes("ウォーデン")){

reply =
"わかったよ😎<br><br>" +
"<code>/summon warden</code>" +
"<br><br>で召喚できるよ！";

}

if(text.includes("100")){

reply +=
"<br><br>100体ならコマンドブロックがおすすめ🔥";

}

if(text.includes("クリーパー")){

reply =
"<code>/summon creeper</code>";

}

setTimeout(()=>{

chat.innerHTML += `
<div class="message ai">
🤖 ${reply}
</div>
`;

chat.scrollTop =
chat.scrollHeight;

},700);

input.value = "";

}

document
.getElementById("aiInput")
.addEventListener("keypress", function(e){

if(e.key === "Enter"){
sendMessage();
}

});

</script>

</body>
</html>
